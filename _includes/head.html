<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#faf9f7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#16171a" media="(prefers-color-scheme: dark)">

<title>{% if page.title and page.url != "/" %}{{ page.title | escape }} · {{ site.title }}{% else %}{{ site.title }} · {{ site.tagline }}{% endif %}</title>

{%- comment -%} SEO, Open Graph and Twitter cards {%- endcomment -%}
{% seo %}

<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
<link rel="canonical" href="{{ page.url | absolute_url }}">

{%- comment -%} Set the colour theme before first paint to avoid a flash {%- endcomment -%}
<script>
  (function () {
    try {
      var stored = localStorage.getItem('cc-theme');
      if (stored === 'light' || stored === 'dark') {
        document.documentElement.setAttribute('data-theme', stored);
      }
    } catch (e) {}
  })();
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">

<link rel="icon" href="{{ '/assets/favicon.svg' | relative_url }}" type="image/svg+xml">
