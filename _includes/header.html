<header class="site-header">
  <div class="wrap site-header__inner">
    <a class="site-header__brand" href="{{ '/' | relative_url }}">
      <span class="site-header__mark" aria-hidden="true">CC</span>
      <span class="site-header__name">{{ site.title }}</span>
    </a>

    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/' | relative_url }}">Writing</a>
      <a href="{{ '/tags/' | relative_url }}">Topics</a>
      <a href="{{ '/about/' | relative_url }}">About</a>
      <a href="{{ '/feed.xml' | relative_url }}" aria-label="RSS feed">RSS</a>
      <button id="theme-toggle" class="theme-toggle" type="button"
              aria-label="Toggle colour theme" title="Toggle light / dark">
        <svg class="theme-toggle__sun" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"></path>
        </svg>
        <svg class="theme-toggle__moon" width="18" height="18" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"></path>
        </svg>
      </button>
    </nav>
  </div>
</header>
